name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Prepare test config
        run: cp config/benchmark.example.json config/benchmark.json
      - name: Unit and fake-Ollama integration tests with coverage
        run: PYTHONPATH=tests coverage run -m unittest discover -s tests -v
      - name: Coverage policy
        run: coverage report
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy
      - name: Static validation
        run: oab validate
      - name: Network-free dry runs
        run: |
          oab functional --mode dry-run
          oab performance --mode dry-run
      - name: Synthetic report generation
        run: python -m unittest discover -s tests -p 'test_report_integration.py' -v
